<svg width="1440" height="420" viewBox="0 0 1440 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Team Collab Skills multi-agent collaboration banner</title>
  <desc id="desc">A dark gradient banner. Left: the wordmark TEAM COLLAB SKILLS, the headline One protocol. Every agent., a feature subtitle, and a tool badge strip. Right: a tidy panel showing a coordinator handing work to implementer, reviewer, and tester agents over a file-backed wave that flows from start to gate to merge.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1440" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#07111F"/>
      <stop offset="0.58" stop-color="#123B46"/>
      <stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>
    <radialGradient id="glowSky" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(250 96) rotate(28) scale(440 230)">
      <stop stop-color="#38BDF8" stop-opacity="0.40"/>
      <stop offset="1" stop-color="#38BDF8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowAmber" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1230 300) rotate(-18) scale(380 220)">
      <stop stop-color="#FDE68A" stop-opacity="0.50"/>
      <stop offset="1" stop-color="#FDE68A" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-30%" width="140%" height="160%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#020617" flood-opacity="0.34"/>
    </filter>
  </defs>

  <rect width="1440" height="420" rx="36" fill="url(#bg)"/>
  <rect width="1440" height="420" rx="36" fill="url(#glowSky)"/>
  <rect width="1440" height="420" rx="36" fill="url(#glowAmber)"/>
  <path d="M0 322C168 250 312 250 492 318C708 398 826 306 1006 228C1182 152 1320 168 1440 214V420H0V322Z" fill="#07111F" fill-opacity="0.42"/>

  <g font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">

    <text x="96" y="70" fill="#5EEAD4" font-size="24" font-weight="800" letter-spacing="0.16em">TEAM COLLAB SKILLS</text>
    <text x="94" y="150" fill="#FFFFFF" font-size="52" font-weight="900" letter-spacing="-0.01em">One protocol. Every agent.</text>
    <text x="96" y="196" fill="#FEF3C7" font-size="22" font-weight="700">multi-agent waves · handoff · checkpoint · gate · docs governance</text>

    <rect x="96" y="346" width="742" height="42" rx="21" fill="#07111F" fill-opacity="0.58" stroke="#2DD4BF" stroke-opacity="0.34"/>
    <text x="124" y="373" fill="#E0F2FE" font-size="17" font-weight="800">Claude · Codex · Cursor · VS Code · Cline · OpenCode · Continue · Gemini</text>

    <g>
      <rect x="856" y="64" width="488" height="292" rx="26" fill="#06101C" fill-opacity="0.70" stroke="#2DD4BF" stroke-opacity="0.30"/>

      <g stroke="#5EEAD4" stroke-opacity="0.55" stroke-width="2.5" fill="none" stroke-linecap="round">
        <path d="M1100 150V166"/>
        <path d="M947 166H1251"/>
        <path d="M947 166V182"/>
        <path d="M1100 166V182"/>
        <path d="M1251 166V182"/>
        <path d="M947 240V258"/>
        <path d="M1100 240V258"/>
        <path d="M1251 240V258"/>
      </g>

      <g filter="url(#soft)">
        <rect x="878" y="100" width="444" height="48" rx="16" fill="#F8FAFC" fill-opacity="0.97"/>
      </g>
      <circle cx="906" cy="124" r="8" fill="#14B8A6"/>
      <text x="926" y="120" fill="#0F172A" font-size="17" font-weight="800" letter-spacing="0.08em">COORDINATOR</text>
      <text x="926" y="139" fill="#475569" font-size="14" font-weight="700">plans the wave</text>

      <g filter="url(#soft)">
        <rect x="878" y="184" width="138" height="56" rx="15" fill="#E0F2FE" fill-opacity="0.97"/>
        <rect x="1031" y="184" width="138" height="56" rx="15" fill="#CCFBF1" fill-opacity="0.97"/>
        <rect x="1184" y="184" width="138" height="56" rx="15" fill="#FEF3C7" fill-opacity="0.97"/>
      </g>
      <g text-anchor="middle">
        <text x="947" y="208" fill="#0F172A" font-size="16" font-weight="800">implementer</text>
        <text x="947" y="226" fill="#475569" font-size="12" font-weight="700">start · checkpoint</text>
        <text x="1100" y="208" fill="#0F172A" font-size="16" font-weight="800">reviewer</text>
        <text x="1100" y="226" fill="#475569" font-size="12" font-weight="700">verdict · gate</text>
        <text x="1251" y="208" fill="#0F172A" font-size="16" font-weight="800">tester</text>
        <text x="1251" y="226" fill="#475569" font-size="12" font-weight="700">checks CI</text>
      </g>

      <text x="1100" y="288" fill="#5EEAD4" font-size="15" font-weight="900" letter-spacing="0.12em" text-anchor="middle">FILE-BACKED WAVE</text>
      <g>
        <rect x="958" y="304" width="86" height="30" rx="15" fill="#0F766E"/>
        <rect x="1057" y="304" width="86" height="30" rx="15" fill="#1E3A45" stroke="#2DD4BF" stroke-opacity="0.4"/>
        <rect x="1156" y="304" width="86" height="30" rx="15" fill="#F59E0B"/>
        <path d="M1046 319H1055" stroke="#5EEAD4" stroke-opacity="0.7" stroke-width="2" stroke-linecap="round"/>
        <path d="M1145 319H1154" stroke="#5EEAD4" stroke-opacity="0.7" stroke-width="2" stroke-linecap="round"/>
        <g text-anchor="middle" font-size="13" font-weight="800">
          <text x="1001" y="324" fill="#FFFFFF">start</text>
          <text x="1100" y="324" fill="#E0F2FE">gate</text>
          <text x="1199" y="324" fill="#0F172A" font-weight="900">merge</text>
        </g>
      </g>
    </g>
  </g>
</svg>
