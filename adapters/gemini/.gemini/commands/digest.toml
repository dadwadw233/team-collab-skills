# team-collab-protocol-source: skills/protocol/SKILL.md@0.6.1
# team-collab-required-commands: handoff, checkpoint, team-progress, docs-refresh, wave, gate, digest
# team-collab-source-of-truth: repo AGENTS.md + installed team-collab-protocol skill

description = "Show a multi-agent wave progress digest."
prompt = """
Use the team-collab protocol. Treat the user arguments as the wave slug: {{args}}

Infer the wave from the current directory if no slug is given, otherwise ask. Run `team-collab multi-agent digest --wave <slug>`. Present the digest and call attention to Needs Decision, Blockers, and Stale Agents. This creates `multi-agent/<slug>/digests/*.md` and a local docs commit; `--refresh-truth-source` may also update agent status files. It does not auto-push, so cross-machine visibility requires an explicit docs repo push. Read references/multi-agent.md and the digest section for details.
"""
